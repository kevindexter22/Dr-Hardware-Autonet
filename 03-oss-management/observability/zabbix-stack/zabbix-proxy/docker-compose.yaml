# Architecture Domain: OSS Management
# Author: Kevin Oliveira
# ==============================================================================

name: zabbix-proxy-oss
services:
  zabbix-proxy:
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cpu_shares: 90
    command: []
    container_name: zabbix-proxy
    deploy:
      resources:
        limits:
          memory: 3784M
    environment:
      - ZBX_ALLOWROOT=1
      - ZBX_DEBUGLEVEL=3
      - ZBX_ENABLEGLOBALSCRIPTS=1
      - ZBX_HOSTNAME=<HOSTNAME>
      - ZBX_LISTENPORT=<CUSTOM_PORT>
      - ZBX_PROXYMODE=0
      - ZBX_SERVER_HOST=<HOST_IP>
      - ZBX_SERVER_PORT=10051
      - ZBX_TIMEOUT=30
    hostname: zabbix-proxy
    image: zabbix/zabbix-proxy-sqlite3:ubuntu-7.0-latest
    labels:
      icon: https://avatars.githubusercontent.com/u/80359616?s=200&v=4
    ports:
      - target: <CUSTOM_PORT>
        published: "<CUSTOM_PORT>"
        protocol: tcp
    privileged: true
    restart: always
    volumes:
      - type: bind
        source: /DATA/AppData/zabbix-proxy/ssh_keys
        target: /var/lib/zabbix/ssh_keys
      - type: bind
        source: /DATA/AppData/zabbix-proxy/dbscripts
        target: /var/lib/zabbix/dbscripts
      - type: bind
        source: /DATA/AppData/zabbix-proxy/db_data
        target: /var/lib/zabbix/db_data
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
    devices: []
    network_mode: bridge
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://avatars.githubusercontent.com/u/80359616?s=200&v=4
  index: /
  is_uncontrolled: false
  port_map: ""
  scheme: http
  store_app_id: zabbix-proxy-oss
  title:
    custom: ""
    en_us: zabbix-proxy
