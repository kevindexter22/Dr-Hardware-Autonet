# ==============================================================================
# Workload: MySpeed
# Original Author: joaobosconff
# Modified by: Kevin Oliveira
# Changes: customized tcp port
# ==============================================================================

name: myspeed
services:
  myspeed:
    cpu_shares: 90
    command: []
    container_name: myspeed
    deploy:
      resources:
        limits:
          memory: 256M
    hostname: myspeed
    image: germannewsmaker/myspeed:1.0.9
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/icon.png
    ports:
      - target: 5216
        published: "<CUSTOM_PORT>"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/myspeed/data
        target: /myspeed/data
    x-casaos:
      ports:
        - container: "5216"
          description:
            en_us: WebUI HTTP Port
            zh_cn: WebUI HTTP端口
          protocol: tcp
      volumes:
        - container: /myspeed/data
          description:
            en_us: MySpeed data folder
            zh_cn: MySpeed数据文件夹
    devices: []
    cap_add: []
    environment: []
    network_mode: bridge
    privileged: false
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  author: joaobosconff
  category: Utilities
  description:
    en_us: MySpeed is a speed test analysis software that stores the speed of your
      internet for up to 30 days. This can also be useful if you want to know
      when your network might have drops or if you want to check if your
      internet matches the booked values from your contract.
    pt_br: MySpeed ​​é um software de análise de teste de velocidade que armazena a
      velocidade da sua internet por até 30 dias. Isso também pode ser útil se
      você quiser saber quando sua rede pode sofrer quedas ou se quiser
      verificar se sua internet corresponde aos valores contratados em seu
      contrato.
    zh_cn: MySpeed是一款速度测试分析软件，可以存储您的互联网速度长达30天。如果您想知道您的网络何时可能会掉线，或者想要检查您的互联网是否与合同中预订的数值相匹配，这也可能会有所帮助。
  developer: Mathias Wagner
  hostname: ""
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/icon.png
  index: /
  is_uncontrolled: false
  main: myspeed
  port_map: "<CUSTOM_PORT>"
  scheme: http
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/screenshot-3.png
  store_app_id: myspeed
  tagline:
    en_us: Analysis software that shows your internet speed for up to 30 days.
    pt_br: Software de análise que mostra a velocidade da sua internet por até 30
      dias.
    zh_cn: 记录网速度长达30天的分析软件。
  title:
    custom: ""
    en_us: MySpeed
    pt_br: MySpeed
